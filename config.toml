# Relay Monitor 配置
listen = ":8080"
check_interval = "8h"
retention_days = 7
max_concurrency = 16
request_interval = "2s"
ssl_verify = false
data_dir = "."
balance_threshold = 5.0
providers_file = "providers.json"

[proxy]
enabled = true
api_key = "sk-relay-zhou"
request_timeout = "30s"
stream_first_byte_timeout = "30s"
stream_idle_timeout = "60s"
max_retries = 2
