# Relay Monitor 配置
listen = "127.0.0.1:8090"
check_interval = "8h"
retention_days = 7
max_concurrency = 16
request_interval = "2s"
ssl_verify = true
data_dir = "./data"
balance_threshold = 5.0
providers_file = "providers.json"
external_url = "https://relay.sharonzhou.site"

[proxy]
enabled = true
api_key = ""
request_timeout = "30s"
stream_first_byte_timeout = "30s"
stream_idle_timeout = "60s"
max_retries = 2
