<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - Relay Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4E1;</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand">relay monitor</span>
        <div class="navbar-links">
            <a href="/">总览</a>
            <a href="/models">模型</a>
            <a href="/fingerprint">指纹</a>
            <a href="/proxy">Proxy</a>
        </div>
        <div class="navbar-right">
            <a href="/provider/add" class="btn btn-sm btn-primary">+ 添加站点</a>
        </div>
    </nav>

    <div class="status-bar">
        <div class="last-check" id="status-text">
            {{if .IsChecking}}
                <span style="color:var(--accent)">&#9678; 检测中...</span>
            {{else}}
                <span style="opacity:0.6">&#9679;</span> 上次检测: {{if .LastCheckTime}}{{.LastCheckTime}}{{else}}尚未检测{{end}}
            {{end}}
        </div>
        <button class="btn btn-sm btn-primary"
                hx-post="/api/v1/check/trigger?mode=full"
                hx-swap="none">
            全量检测
        </button>
        <button class="btn btn-sm"
                hx-post="/api/v1/check/trigger?mode=quick"
                hx-swap="none">
            快速检测
        </button>
        {{if gt .UnreadEvents 0}}
            <span class="unread-badge">{{.UnreadEvents}} 条未读变更</span>
        {{end}}
    </div>

    <!-- Live task panel, hidden by default -->
    <div id="task-panel" class="task-panel" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <strong style="font-size:0.78rem;color:var(--accent);font-family:var(--mono)">TASK PROGRESS</strong>
            <span id="task-summary" style="font-size:0.72rem;color:var(--text-dim);font-family:var(--mono)"></span>
        </div>
        <div id="task-log" style="font-size:0.72rem;font-family:var(--mono);max-height:120px;overflow-y:auto;color:var(--text-dim);line-height:1.7"></div>
    </div>

    <div class="main">
        {{block "content" .}}{{end}}
    </div>

<script>
(function() {
    var es = new EventSource('/api/v1/sse');
    var reloadTimer = null;
    var panel = document.getElementById('task-panel');
    var taskLog = document.getElementById('task-log');
    var taskSummary = document.getElementById('task-summary');
    var statusText = document.getElementById('status-text');

    // Highlight active nav link
    var path = location.pathname;
    document.querySelectorAll('.navbar-links a').forEach(function(a) {
        if (path === a.getAttribute('href') || (a.getAttribute('href') !== '/' && path.startsWith(a.getAttribute('href')))) {
            a.classList.add('active');
        } else if (a.getAttribute('href') === '/' && path === '/') {
            a.classList.add('active');
        }
    });

    es.addEventListener('check_started', function(e) {
        panel.style.display = 'block';
        taskLog.innerHTML = '';
        taskSummary.textContent = e.data;
        statusText.innerHTML = '<span style="color:var(--accent)">&#9678; 检测中... ' + e.data + '</span>';
    });

    es.addEventListener('check_progress', function(e) {
        panel.style.display = 'block';
        var line = document.createElement('div');
        line.textContent = e.data;
        taskLog.appendChild(line);
        taskLog.scrollTop = taskLog.scrollHeight;
    });

    es.addEventListener('provider_done', function(e) {
        statusText.innerHTML = '<span style="color:var(--accent)">&#9678; 检测中... ' + e.data + ' 完成</span>';
    });

    es.addEventListener('check_completed', function(e) {
        panel.style.display = 'none';
        if (reloadTimer) clearTimeout(reloadTimer);
        reloadTimer = setTimeout(function() { location.reload(); }, 500);
    });

    es.onerror = function() {
        es.close();
        setTimeout(function() { es = new EventSource('/api/v1/sse'); }, 5000);
    };
})();
</script>
</body>
</html>
